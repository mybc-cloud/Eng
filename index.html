            <div class="mb-6">
                <h2 class="text-[clamp(1.25rem,3vw,1.5rem)] font-bold mb-2">单选题</h2>
                <p id="question-unit" class="text-[clamp(0.9rem,2vw,1rem)] text-neutral-500 mb-1"></p>

        // 当前题目索引
        let currentQuestionIndex = 0;
        // 用户答案记录
        let userAnswers = {};
        // 是否已回答当前题目
        let hasAnswered = false;

        // DOM元素
        const questionUnitEl = document.getElementById('question-unit');
        const questionNumberEl = document.getElementById('question-number');
        const questionTextEl = document.getElementById('question-text');
        const optionsContainerEl = document.getElementById('options-container');
        const answerFeedbackEl = document.getElementById('answer-feedback');
        const correctAnswerEl = document.getElementById('correct-answer');
        const explanationTextEl = document.getElementById('explanation-text');
        const prevBtn = document.getElementById('prev-btn');
        const nextBtn = document.getElementById('next-btn');

        // 初始化页面
        function init() {
            renderQuestion();
            updateNavigationButtons();
            
            // 上一题按钮点击事件
            prevBtn.addEventListener('click', () => {
                if (currentQuestionIndex > 0) {
                    currentQuestionIndex--;
                    hasAnswered = !!userAnswers[currentQuestionIndex];
                    renderQuestion();
                    updateNavigationButtons();
                }
            });
            
            // 下一题按钮点击事件
            nextBtn.addEventListener('click', () => {
                if (currentQuestionIndex < questions.length - 1) {
                    currentQuestionIndex++;
                    hasAnswered = !!userAnswers[currentQuestionIndex];
                    renderQuestion();
                    updateNavigationButtons();
                }
            });
        }

        // 渲染当前题目
        function renderQuestion() {
            const question = questions[currentQuestionIndex];
            
            // 更新单元信息、题号和题目内容
            questionUnitEl.textContent = question.unit;
            questionNumberEl.textContent = `${question.id}. `;
            questionTextEl.textContent = question.text;
            
            // 清空选项容器
            optionsContainerEl.innerHTML = '';
            
            // 渲染选项
            question.options.forEach(option => {
                const optionEl = document.createElement('div');
                optionEl.className = 'option border border-neutral-200 rounded-lg p-4 flex items-center cursor-pointer option-hover';
                optionEl.dataset.optionId = option.id;
                
                const optionText = document.createElement('span');
                optionText.className = 'text-[clamp(1rem,2.5vw,1.125rem)]';
                optionText.textContent = `${option.id}  ${option.text}`;
                
                optionEl.appendChild(optionText);
                
                // 如果已经回答，显示结果
                if (hasAnswered) {
                    const userAnswer = userAnswers[currentQuestionIndex];
                    
                    if (option.id === question.correctAnswer) {
                        // 正确答案
                        optionEl.classList.remove('border-neutral-200', 'hover:bg-neutral-100');
                        optionEl.classList.add('border-correct', 'bg-correct/10');
                        
                        const checkIcon = document.createElement('i');
                        checkIcon.className = 'fa fa-check text-correct text-xl mr-3';
                        optionEl.insertBefore(checkIcon, optionText);
                    } else if (option.id === userAnswer && userAnswer !== question.correctAnswer) {
                        // 用户选错的答案
                        optionEl.classList.remove('border-neutral-200', 'hover:bg-neutral-100');
                        optionEl.classList.add('border-incorrect', 'bg-incorrect/10');
                        
                        const timesIcon = document.createElement('i');
                        timesIcon.className = 'fa fa-times text-incorrect text-xl mr-3';
                        optionEl.insertBefore(timesIcon, optionText);
                    }
                    
                    // 已回答的题目不能再点击
                    optionEl.classList.remove('cursor-pointer', 'option-hover');
                    optionEl.style.pointerEvents = 'none';
                } else {
                    // 未回答的题目添加点击事件
                    optionEl.addEventListener('click', () => handleOptionClick(option.id));
                }
                
                optionsContainerEl.appendChild(optionEl);
            });
            
            // 显示答案反馈（如果已回答）
            if (hasAnswered) {
                showAnswerFeedback();
            } else {
                hideAnswerFeedback();
            }
        }

        // 处理选项点击
        function handleOptionClick(selectedOptionId) {
            if (hasAnswered) return;
            
            hasAnswered = true;
            userAnswers[currentQuestionIndex] = selectedOptionId;
            
            // 重新渲染题目以显示结果
            renderQuestion();
        }

        // 显示答案反馈
        function showAnswerFeedback() {
            const question = questions[currentQuestionIndex];
            const userAnswer = userAnswers[currentQuestionIndex];
            
            correctAnswerEl.innerHTML = `正确答案 <span class="font-medium">${question.correctAnswer}</span>，我的答案 <span class="${userAnswer === question.correctAnswer ? 'text-correct' : 'text-incorrect'} font-medium">${userAnswer}</span>`;
            explanationTextEl.textContent = question.explanation;
            
            answerFeedbackEl.classList.remove('hidden');
            // 添加淡入动画
            answerFeedbackEl.classList.add('animate-fadeIn');
        }

        // 隐藏答案反馈
        function hideAnswerFeedback() {
            answerFeedbackEl.classList.add('hidden');
            answerFeedbackEl.classList.remove('animate-fadeIn');
        }

        // 更新导航按钮状态
        function updateNavigationButtons() {
            prevBtn.disabled = currentQuestionIndex === 0;
            nextBtn.disabled = currentQuestionIndex === questions.length - 1;
            
            // 更新下一题按钮文本
            if (currentQuestionIndex === questions.length - 1) {
                nextBtn.innerHTML = '完成 <i class="fa fa-check ml-1"></i>';
            } else {
                nextBtn.innerHTML = '下一题 <i class="fa fa-chevron-right ml-1"></i>';
            }
        }

        // 添加CSS动画
        const style = document.createElement('style');
        style.textContent = `
            @keyframes fadeIn {
                from { opacity: 0; transform: translateY(10px); }
                to { opacity: 1; transform: translateY(0); }
            }
            .animate-fadeIn {
                animation: fadeIn 0.3s ease-out forwards;
            }
        `;
        document.head.appendChild(style);

        // 启动应用
        init();
    </script>
